<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>JIKOS Shop Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; border-bottom: 1px solid #eee; padding-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
    input {
      width: 100%; padding: 14px 16px; font-size: 16px;
      border: 1.5px solid #e0e0e0; border-radius: 12px; margin-bottom: 16px;
    }
    button {
      width: 100%; padding: 16px; font-size: 16px; font-weight: 600;
      color: white; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: none; border-radius: 12px; cursor: pointer; margin-bottom: 12px;
    }
    button.secondary {
      background: transparent;
      color: #1a1a2e;
      border: 1.5px solid #1a1a2e;
    }
    .card { background: #f8f9ff; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .shop-name { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
    .token-row { display: flex; align-items: baseline; justify-content: space-between; }
    .token-balance { font-size: 36px; font-weight: 800; color: #1a1a2e; }
    .token-label { font-size: 14px; color: #666; }
    #status { background: #1a1a2e; color: #00ff00; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-bottom: 16px; }
    .hidden { display: none !important; }
    .footer-note { text-align: center; font-size: 12px; color: #aaa; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 JIKOS</h1>
    <div class="subtitle">Shop Dashboard</div>
    
    <div id="status">⏳ Loading...</div>
    
    <!-- LOGIN SECTION -->
    <div id="loginSection">
      <label>Email</label>
      <input type="email" id="email" value="masterbiz.int@gmail.com">
      <label>Password</label>
      <input type="password" id="password">
      <button id="loginBtn">Sign In</button>
      <button id="showSignupBtn" class="secondary">Create Account</button>
      <div class="footer-note">Jesus is King! 👑</div>
    </div>
    
    <!-- SIGNUP SECTION -->
    <div id="signupSection" class="hidden">
      <label>Shop Name</label>
      <input type="text" id="signupShopName" placeholder="My Shop" maxlength="50">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="shop@example.com">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="••••••••" minlength="6">
      <button id="signupBtn">Sign Up</button>
      <button id="backToLoginBtn" class="secondary">Back to Login</button>
      <div class="footer-note">Jesus is King! 👑</div>
    </div>
    
    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection" style="display: none;">
      <div class="card">
        <div id="shopNameDisplay" class="shop-name">Loading...</div>
        <div class="token-row">
          <span id="tokenBalanceDisplay" class="token-balance">--</span>
          <span class="token-label">SMS Tokens</span>
        </div>
      </div>
      <label>Update Shop Name</label>
      <input type="text" id="newShopName">
      <button id="updateShopBtn">Save Shop Name</button>
      <button id="logoutBtn" style="background: transparent; color: #666; border: 1px solid #ddd;">Sign Out</button>
      <div class="footer-note">Jesus is King! 👑</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    const statusEl = document.getElementById('status');
    function log(msg) { statusEl.textContent = msg; console.log(msg); }
    
    log('✅ Page loaded. Waiting for Supabase...');
    
    function waitForSupabase(callback) {
      if (typeof window.supabase !== 'undefined') {
        log('✅ Supabase found!');
        callback();
      } else {
        log('⏳ Waiting for Supabase to load...');
        setTimeout(() => waitForSupabase(callback), 100);
      }
    }
    
    waitForSupabase(function() {
      log('✅ Starting app...');
      
      const SUPABASE_URL = 'https://hmsfisqjzgljfhmhsnsp.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtc2Zpc3FqemdsamZobWhzbnNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzA5MDYsImV4cCI6MjA5MDQ0NjkwNn0.9PvUZkwTEd2ozXQRFlY6qgN3P__y1RqfnUWjVfujPoU';
      
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      log('✅ Supabase client created');
      
      // DOM Elements
      const loginSection = document.getElementById('loginSection');
      const signupSection = document.getElementById('signupSection');
      const dashboardSection = document.getElementById('dashboardSection');
      const shopNameDisplay = document.getElementById('shopNameDisplay');
      const tokenBalanceDisplay = document.getElementById('tokenBalanceDisplay');
      const newShopNameInput = document.getElementById('newShopName');
      const loginBtn = document.getElementById('loginBtn');
      const showSignupBtn = document.getElementById('showSignupBtn');
      const backToLoginBtn = document.getElementById('backToLoginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const updateShopBtn = document.getElementById('updateShopBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const signupShopName = document.getElementById('signupShopName');
      const signupEmail = document.getElementById('signupEmail');
      const signupPassword = document.getElementById('signupPassword');
      
      let currentShopId = null;
      
      // Navigation
      showSignupBtn.addEventListener('click', () => {
        loginSection.classList.add('hidden');
        signupSection.classList.remove('hidden');
        dashboardSection.style.display = 'none';
        log('📝 Signup form');
      });
      
      backToLoginBtn.addEventListener('click', () => {
        signupSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        dashboardSection.style.display = 'none';
        log('🔐 Login form');
      });
      
      async function loadShopData() {
        log('📦 Loading shop data...');
        try {
          const { data: { user } } = await supabase.auth.getUser();
          if (!user) { 
            loginSection.classList.remove('hidden');
            signupSection.classList.add('hidden');
            dashboardSection.style.display = 'none';
            return; 
          }
          
          const { data: shop } = await supabase
            .from('shop_settings')
            .select('shop_id, shop_name')
            .eq('user_id', user.id)
            .maybeSingle();
          
          if (!shop) {
            shopNameDisplay.textContent = 'No shop linked';
            return;
          }
          
          currentShopId = shop.shop_id;
          
          const { data: wallet } = await supabase
            .from('wallets')
            .select('token_balance')
            .eq('shop_id', currentShopId)
            .maybeSingle();
          
          shopNameDisplay.textContent = shop.shop_name || 'My Shop';
          tokenBalanceDisplay.textContent = wallet?.token_balance ?? 0;
          newShopNameInput.value = shop.shop_name || '';
          
          log('✅ Dashboard ready!');
        } catch (e) {
          log('❌ Error: ' + e.message);
        }
      }
      
      function showDashboard() {
        loginSection.classList.add('hidden');
        signupSection.classList.add('hidden');
        dashboardSection.style.display = 'block';
        loadShopData();
      }
      
      // Login
      loginBtn.addEventListener('click', async () => {
        log('🔐 Logging in...');
        const { data, error } = await supabase.auth.signInWithPassword({
          email: emailInput.value,
          password: passwordInput.value
        });
        
        if (error) {
          log('❌ ' + error.message);
          alert(error.message);
        } else {
          log('✅ Login success!');
          showDashboard();
        }
      });
      
      // Signup
      signupBtn.addEventListener('click', async () => {
        const shopName = signupShopName.value.trim();
        const email = signupEmail.value.trim();
        const password = signupPassword.value;
        
        if (!shopName || !email || !password) {
          alert('Please fill in all fields');
          return;
        }
        
        if (password.length < 6) {
          alert('Password must be at least 6 characters');
          return;
        }
        
        log('📝 Creating account...');
        
        try {
          const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
          if (authError) throw authError;
          
          const userId = authData.user.id;
          
          await supabase.from('shop_settings').insert({
            shop_id: userId,
            shop_name: shopName,
            user_id: userId,
            updated_at: new Date()
          });
          
          await supabase.from('wallets').insert({
            shop_id: userId,
            token_balance: 10,
            created_at: new Date(),
            updated_at: new Date()
          });
          
          alert('Account created! You can now sign in.');
          signupShopName.value = '';
          signupEmail.value = '';
          signupPassword.value = '';
          emailInput.value = email;
          
          signupSection.classList.add('hidden');
          loginSection.classList.remove('hidden');
          log('✅ Account created');
          
        } catch (e) {
          log('❌ ' + e.message);
          alert(e.message);
        }
      });
      
      // Update shop name
      updateShopBtn.addEventListener('click', async () => {
        const newName = newShopNameInput.value.trim();
        if (!newName) { alert('Enter a shop name'); return; }
        
        await supabase
          .from('shop_settings')
          .update({ shop_name: newName })
          .eq('shop_id', currentShopId);
        
        shopNameDisplay.textContent = newName;
        alert('Shop name updated!');
      });
      
      // Logout
      logoutBtn.addEventListener('click', async () => {
        await supabase.auth.signOut();
        loginSection.classList.remove('hidden');
        signupSection.classList.add('hidden');
        dashboardSection.style.display = 'none';
        passwordInput.value = '';
        log('✅ Signed out');
      });
      
      // Check existing session
      supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          log('✅ Existing session found');
          showDashboard();
        } else {
          log('✅ Ready for login');
        }
      });
    });
  </script>
</body>
</html>
